name: EarthChimp Weekly Scraper

on:
  # Every Monday 8:00 AM PHT (= Monday 00:00 UTC, since PHT is UTC+8)
  schedule:
    - cron: '0 0 * * 1'

  # Manual trigger — tap "Run workflow" from the GitHub mobile app anytime
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        env:
          # Skip downloading Chromium — we don't use Puppeteer in production
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install

      - name: Run scraper
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: node amazon-scraper.js

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update dashboard $(date +'%Y-%m-%d')"
          git push
