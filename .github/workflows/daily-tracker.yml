name: EarthChimp Daily Review Tracker

on:
  # Every day at 8:00 AM PHT (= 00:00 UTC, since PHT is UTC+8)
  schedule:
    - cron: '0 0 * * *'

  # Manual trigger from GitHub mobile app
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install

      - name: Run weekly tracker
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: node weekly-tracker.js

      - name: Commit updated report and baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baselines.json weekly-report.json
          git diff --cached --quiet || git commit -m "chore: daily tracker update $(date +'%Y-%m-%d')"
          git push
